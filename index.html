<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVault — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

  <!-- Fondo animado -->
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- Partículas flotantes -->
  <div class="particles" id="particles"></div>

  <!-- Card login -->
  <main class="login-wrapper">
    <div class="login-card" id="loginCard">

      <!-- Logo / brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="8,6 34,20 8,34" fill="currentColor"/>
            <rect x="28" y="6" width="4" height="28" rx="2" fill="currentColor" opacity="0.5"/>
          </svg>
        </div>
        <h1 class="brand-name">StreamVault</h1>
        <p class="brand-sub">Panel de administración</p>
      </div>

      <!-- Formulario -->
      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" placeholder="admin@ejemplo.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="field-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="toggle-pass" id="togglePass" aria-label="Ver contraseña">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Mensaje de error -->
        <div class="error-box" id="errorBox" aria-live="polite"></div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Ingresar</span>
          <span class="btn-loader" id="btnLoader" hidden>
            <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10" stroke-opacity="0.2"/>
              <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
      </form>

      <p class="login-footer">StreamVault &copy; 2025 · Sistema de gestión de cuentas</p>
    </div>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
